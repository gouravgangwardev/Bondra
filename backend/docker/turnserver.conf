# coturn TURN server configuration
# Replace YOUR_PUBLIC_IP with your server's public IP address

listening-port=3478
tls-listening-port=5349

# Replace with your server's public IP
# external-ip=YOUR_PUBLIC_IP

# Relay ports
min-port=49152
max-port=65535

# Auth
lt-cred-mech
user=bondra:changeme

# Realm
realm=bondra.app

# Logging
log-file=/var/log/coturn/coturn.log
verbose

# Disable legacy protocols
no-rfc5780
no-stun-backward-compatibility
response-origin-only-with-rfc5780

# Security
fingerprint
